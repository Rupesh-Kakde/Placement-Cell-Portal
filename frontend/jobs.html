<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Management</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

<aside class="sidebar">

<div class="logo">
<i class="fas fa-graduation-cap"></i>
<h2>Placement Portal</h2>
</div>

<ul class="menu">

<li>
<a href="index.html">
<i class="fas fa-home"></i>
Dashboard
</a>
</li>

<li>
<a href="student.html">
<i class="fas fa-user-graduate"></i>
Students
</a>
</li>

<li>
<a href="company.html">
<i class="fas fa-building"></i>
Companies
</a>
</li>

<li class="active">
<a href="jobs.html">
<i class="fas fa-briefcase"></i>
Jobs
</a>
</li>

<li>
<a href="applications.html">
<i class="fas fa-file-alt"></i>
Applications
</a>
</li>

<li>
<a href="admin.html">
<i class="fas fa-chart-line"></i>
Admin
</a>
</li>

</ul>

</aside>

<main class="main-content">

<header class="header">
<h1>Job Management</h1>
<p>Create and manage job opportunities</p>
</header>

<div class="form-card">

<h2>Create Job Posting</h2>

<form id="jobForm">

<div class="form-grid">

<div class="form-group">
<label>Job Title</label>
<input type="text" id="jobTitle" placeholder="Node.js Developer">
</div>

<div class="form-group">
<label>Required Skills</label>
<input type="text" id="jobSkills" placeholder="Node.js, MongoDB, Express">
</div>

<div class="form-group">
<label>Company</label>

<select id="jobCompany" required>
<option value="">
Select Company
</option>
</select>

</div>
<div class="form-group">
<label>Package (LPA)</label>
<input type="number" id="jobPackage" placeholder="6">
</div>

<div class="form-group">
<label>Application Deadline</label>
<input type="date" id="jobDeadline">
</div>

</div>

<button class="btn-primary" type="submit">
Create Job
</button>

</form>

</div>

<div class="table-card">

<h2>Available Jobs</h2>

<table>

<thead>
<tr>
<th>Company</th>
<th>Title</th>
<th>Skills</th>
<th>Package</th>
<th>Deadline</th>
</tr>
</thead>

<tbody id="jobTableBody">
</tbody>

</table>

</div>

</main>

</div>

<script src="js/auth.js"></script>
<script src="js/protect.js"></script>
<script src="js/jobs.js"></script>
</body>
</html>
