href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

<aside class="sidebar">

<div class="logo">
<i class="fas fa-graduation-cap"></i>
<h2>Placement Portal</h2>
</div>

<ul class="menu">

<li>
<a href="index.html">
<i class="fas fa-home"></i>
Dashboard

</li>

<li>

<li>
<a href="admin.html">

</ul>

</aside>

<main class="main-content">

<header class="header">
<h1>Company Management</h1>
<p>Create and manage company profiles</p>
</header>

<div class="form-card">

<h2>Add Company</h2>

<form id="companyForm">

<div class="form-grid">

<div class="form-group">
<label>Company Name</label>
<input type="text" id="companyName" required>
</div>

<div class="form-group">
<label>Website</label>
<input type="text" id="companyWebsite" required>
</div>

<div class="form-group">
<label>Sector</label>
<input type="text" id="companySector" required>
</div>

<div class="form-group">
<label>Contact Email</label>
<input type="email" id="companyEmail" required>
</div>

</div>

<button type="submit" class="btn-primary">
Save Company
</button>

</form>

</div>

<div class="table-card">

<h2>Company Records</h2>

<table>

<thead>
<tr>
<th>Company</th>
<th>Website</th>
<th>Sector</th>
<th>Email</th>
</tr>
</thead>

<tbody id="companyTableBody">
</tbody>

</table>

</div>

</main>

</div>

<script src="js/auth.js"></script>
<script src="js/protect.js"></script>
<script src="js/company.js"></script>
</body>
</html>
